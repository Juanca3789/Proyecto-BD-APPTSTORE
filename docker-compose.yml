services:
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${UI_PORT:-3000}:80"
    restart: unless-stopped
    networks:
      - apptstore

networks:
  apptstore:
    name: apptstore
